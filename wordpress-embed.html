<!--
  BePickleballer - Paddle Finder Quiz embed
  -----------------------------------------
  Paste this entire block into a WordPress "Custom HTML" block on any page.
  The iframe auto-resizes to fit the quiz content so the visitor never sees
  an inner scrollbar.
-->
<div style="max-width:100vw;margin:0 auto;">
  <iframe
    id="bp-paddle-quiz-iframe"
    src="https://dmytriisynchuk.github.io/bp-quiz/"
    title="Paddle Finder Quiz"
    width="100%"
    height="900"
    frameborder="0"
    style="border:0;width:100%;display:block;"
    allow="clipboard-write"
    loading="lazy"
  ></iframe>
</div>
<script>
(function(){
  var QUIZ_BASE = 'https://dmytriisynchuk.github.io/bp-quiz/';
  var ALLOWED_ORIGIN = 'https://dmytriisynchuk.github.io';
  var iframe = document.getElementById('bp-paddle-quiz-iframe');
  if (!iframe) return;

  // Forward the parent's ?r=<id> (if any) into the iframe src so a shared
  // results link like /quiz/?r=abc123 loads that saved result. We only override
  // src when there is a query string; otherwise the HTML default already loads.
  if (window.location.search) {
    iframe.src = QUIZ_BASE + window.location.search;
  }

  window.addEventListener('message', function(e){
    if (e.origin !== ALLOWED_ORIGIN) return;
    if (!e.data || !e.data.type) return;
    if (e.data.type === 'bp-quiz-height') {
      var h = parseInt(e.data.height, 10);
      if (isNaN(h) || h < 200) return;
      iframe.style.height = (h + 20) + 'px';
    }
    if (e.data.type === 'bp-quiz-result-id' && e.data.id) {
      // Mirror the result id into the parent URL so the visitor can copy/share it
      try {
        var url = new URL(window.location.href);
        url.searchParams.set('r', String(e.data.id));
        window.history.replaceState({}, '', url.toString());
      } catch (err) {}
    }
  });
})();
</script>
