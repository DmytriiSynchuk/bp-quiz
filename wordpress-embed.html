<!--
  BePickleballer - Paddle Finder Quiz embed
  -----------------------------------------
  Paste this entire block into a WordPress "Custom HTML" block on any page.
  The iframe auto-resizes to fit the quiz content and the parent URL is
  mirrored with ?r=<id> when the quiz completes so refresh keeps the results.

  The script is loaded externally so WordPress's wpautop filter cannot mangle
  inline JS - do NOT inline the loader into the block.
-->
<div style="max-width:100vw;margin:0 auto;">
  <iframe
    id="bp-paddle-quiz-iframe"
    src="https://dmytriisynchuk.github.io/bp-quiz/"
    title="Paddle Finder Quiz"
    width="100%"
    height="900"
    frameborder="0"
    style="border:0;width:100%;display:block;"
    allow="clipboard-write"
    loading="lazy"
  ></iframe>
</div>
<script src="https://dmytriisynchuk.github.io/bp-quiz/embed-loader.js"></script>
